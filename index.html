<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Shawarma Tycoon - Evolution Pro</title>
    <style>
        :root { --p: #ff6b11; --s: #1a1a1a; --g: #f1c40f; --blue: #3498db; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- SPELYTA --- */
        #main { flex: 1.5; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-right: 2px solid #333; }
        #money-display { font-size: 4rem; color: var(--g); font-weight: 900; margin: 0; text-shadow: 0 0 20px rgba(241, 196, 15, 0.3); }
        
        #shawarma { 
            font-size: 150px; cursor: pointer; user-select: none; 
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 10; 
        }
        #shawarma:active { transform: scale(0.8) rotate(-5deg); }
        
        /* --- UNIKA MEKANIKER --- */
        #kebab-spinner { width: 100px; height: 150px; background: #5d4037; margin: 20px; display: none; position: relative; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 3px solid transparent; }
        #kebab-spinner.ready { border-color: var(--g); box-shadow: 0 0 20px var(--g); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #spinner-rod { width: 10px; height: 100%; background: #3e2723; margin: 0 auto; position: relative; }

        #stock-market { width: 80%; height: 120px; background: #000; margin-top: 20px; display: none; border: 1px solid #444; position: relative; overflow: hidden; border-radius: 10px; }
        .bar { position: absolute; bottom: 0; width: 15px; background: var(--p); transition: height 0.5s ease; border-top: 2px solid white; }

        /* --- SHOP --- */
        #sidebar { width: 450px; background: var(--s); display: flex; flex-direction: column; }
        .header { padding: 20px; background: #111; text-align: center; border-bottom: 3px solid var(--p); font-weight: bold; }
        #upgrade-list { flex: 1; overflow-y: auto; padding: 15px; }

        .upg-card { background: #252525; margin-bottom: 10px; padding: 15px; border-radius: 10px; border: 2px solid #333; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .upg-card:hover:not(.locked) { border-color: var(--blue); background: #2a2a2a; }
        .upg-card.locked { opacity: 0.3; cursor: not-allowed; }
        .upg-card.maxed { border-color: var(--g); cursor: default; }

        /* Flytande text */
        .pop { position: absolute; font-weight: bold; pointer-events: none; z-index: 100; font-size: 24px; }
    </style>
</head>
<body>

<div id="main">
    <div id="money-display">$0</div>
    <div id="status">Bli Shawarma Mastern!</div>
    
    <div id="shawarma">🥙</div>

    <div id="kebab-spinner" onclick="claimSpinner()">
        <div id="spinner-rod"></div>
        <div style="position:absolute; bottom:-25px; width:100%; text-align:center; font-size:12px">SNURRARE</div>
    </div>

    <div id="stock-market" onclick="sellStocks()">
        <div style="position:absolute; top:5px; left:5px; font-size:10px; color:var(--blue); z-index:5">KEBAB STOCKS (Klicka för att sälja allt)</div>
        <div id="chart" style="height:100%; display:flex; align-items:flex-end; gap:2px; justify-content:center"></div>
    </div>
</div>

<div id="sidebar">
    <div class="header">🌯 SHAWARMA TYCOON PRO</div>
    <div id="upgrade-list"></div>
</div>

<script>
    let money = 0;
    let clickPower = 1;
    let pps = 0;
    let incomeMult = 1.0;
    let goldChance = 0;
    let spinnerRotation = 0;
    let spinnerSpeed = 1;
    let spinnerReady = false;
    let stocksPrice = 400;
    let stockHistory = Array(25).fill(0);

    const questions = [
        { q: "Är vitlökssåsen hemgjord?", a: true },
        { q: "Har ni extra stark chili?", a: true },
        { q: "Är det okej att ha ananas i rullen?", a: false },
        { q: "Kan jag betala med monopolpengar?", a: false },
        { q: "Är kebab och shawarma exakt samma sak?", a: false },
        { q: "Använder ni färskt pitabröd?", a: true },
        { q: "Har ni öppet 25 timmar om dygnet?", a: false }
    ];

    const upgrades = [
        { id: 1, n: "Extra Kött", c: 20, m: 30, count: 0, d: "+$1 per klick", act: () => clickPower += 1 },
        { id: 2, n: "Stol", c: 50, m: 20, count: 0, d: "+$1 per sekund", act: () => pps += 1 },
        { id: 3, n: "Worker", c: 100, m: 10, count: 0, d: "+$2 per sekund", act: () => pps += 2 },
        { id: 4, n: "Golden Seasoning", c: 200, m: 1, count: 0, d: "10% chans för Golden Shawarma ($100)", act: () => goldChance = 0.1 },
        { id: 5, n: "Kebab Snurrare", c: 2000, m: 10, count: 0, d: "Snurra 360° för $500 reward", act: () => { 
            document.getElementById('kebab-spinner').style.display = 'block';
            spinnerSpeed += 0.5;
        }},
        { id: 6, n: "Website", c: 10000, m: 1, count: 0, d: "Kundfrågor ger $5,000", act: () => startWebsite() },
        { id: 7, n: "Kebab Stocks", c: 25000, m: 1, count: 0, d: "Låser upp börsen (Start $400)", act: () => document.getElementById('stock-market').style.display = 'block' },
        { id: 8, n: "Sidoförsäljning", c: 50000, m: 10, count: 0, d: "+10% total inkomst", act: () => incomeMult += 0.1 },
        { id: 9, n: "Automatiskt Claim", c: 150000, m: 1, count: 0, d: "Claimar spinnern automatiskt", act: () => {} },
        { id: 10, n: "V.I.P Lounge", c: 500000, m: 1, count: 0, d: "Dubblar klick-värdet", act: () => clickPower *= 2 },
        { id: 11, n: "Influencer Deal", c: 1500000, m: 1, count: 0, d: "Slumpmässiga pengar-regn", act: () => startRain() },
        { id: 12, n: "Shawarma Mastern", c: 10000000, m: 1, count: 0, d: "Du har nått toppen!", act: () => alert("GRATTIS MASTER!") }
    ];

    function renderShop() {
        const list = document.getElementById('upgrade-list');
        list.innerHTML = '';
        upgrades.forEach((u, i) => {
            const isMaxed = u.count >= u.m;
            const card = document.createElement('div');
            card.className = `upg-card ${money < u.c ? 'locked' : ''} ${isMaxed ? 'maxed' : ''}`;
            card.onclick = () => buy(i);
            card.innerHTML = `<div><b>${u.n} (${u.count}/${u.m})</b><br><small>${u.d}</small></div>
                              <div style="color:var(--g)">${isMaxed ? 'MAX' : '$'+formatNum(u.c)}</div>`;
            list.appendChild(card);
        });
    }

    function formatNum(n) {
        if (n >= 1000000) return (n/1000000).toFixed(1) + "M";
        if (n >= 1000) return (n/1000).toFixed(1) + "k";
        return Math.floor(n);
    }

    function buy(i) {
        let u = upgrades[i];
        if (money >= u.c && u.count < u.m) {
            money -= u.c;
            u.count++;
            u.act();
            u.c = Math.floor(u.c * 1.35);
            renderShop();
        }
    }

    document.getElementById('shawarma').onclick = (e) => {
        let gain = clickPower;
        let isGold = Math.random() < goldChance;
        if (isGold) gain = 100;
        let totalGain = gain * incomeMult;
        money += totalGain;
        showPop(e, `+$${Math.floor(totalGain)}`, isGold ? 'gold' : 'white');
        renderShop();
    };

    function showPop(e, txt, type) {
        const p = document.createElement('div');
        p.className = 'pop';
        p.style.left = (e ? e.clientX : window.innerWidth/2) + 'px';
        p.style.top = (e ? e.clientY : window.innerHeight/2) + 'px';
        p.style.color = type === 'gold' ? 'var(--g)' : 'white';
        p.innerText = txt;
        document.body.appendChild(p);
        
        let start = Date.now();
        let timer = setInterval(() => {
            let time = Date.now() - start;
            p.style.top = (parseFloat(p.style.top) - 2) + 'px';
            p.style.opacity = 1 - (time / 800);
            if (time > 800) { clearInterval(timer); p.remove(); }
        }, 16);
    }

    function updateSpinner() {
        if (upgrades[4].count > 0 && !spinnerReady) {
            spinnerRotation += spinnerSpeed;
            document.getElementById('spinner-rod').style.transform = `rotate(${spinnerRotation}deg)`;
            if (spinnerRotation >= 360) {
                spinnerRotation = 0; spinnerReady = true;
                document.getElementById('kebab-spinner').classList.add('ready');
                if (upgrades[8].count > 0) claimSpinner();
            }
        }
    }

    function claimSpinner() {
        if (spinnerReady) {
            money += 500 * incomeMult;
            spinnerReady = false;
            document.getElementById('kebab-spinner').classList.remove('ready');
            renderShop();
        }
    }

    function startWebsite() {
        setInterval(() => {
            let quest = questions[Math.floor(Math.random() * questions.length)];
            if (confirm(`KUNDFRÅGA: ${quest.q}`)) {
                if (quest.a === true) { money += 5000 * incomeMult; alert("Kunden är supernöjd! +$5,000"); }
                else { alert("Kunden blev arg... fel svar!"); }
            } else {
                if (quest.a === false) { money += 5000 * incomeMult; alert("Bra svar! Kunden håller med. +$5,000"); }
                else { alert("Kunden ville ha ett JA... du förlorade chansen."); }
            }
            renderShop();
        }, 60000);
    }

    function sellStocks() {
        if(upgrades[6].count > 0) {
            money += stocksPrice;
            stocksPrice = 400;
            renderShop();
        }
    }

    // Uppdaterad Börs-logik
    setInterval(() => {
        if (upgrades[6].count > 0) {
            let change = (Math.random() * 60) - 28; // Ändras mer dramatiskt
            stocksPrice = Math.max(10, stocksPrice + change);
            stockHistory.push(stocksPrice);
            stockHistory.shift();
            
            const chart = document.getElementById('chart');
            chart.innerHTML = '';
            stockHistory.forEach(p => {
                const b = document.createElement('div');
                b.className = 'bar';
                b.style.height = (p / 6) + "px"; // Skalning för att passa boxen
                chart.appendChild(b);
            });
        }
    }, 1000);

    function startRain() {
        setInterval(() => {
            const drop = document.createElement('div');
            drop.innerText = "🌯";
            drop.style.position = 'absolute';
            drop.style.left = Math.random() * 80 + "vw";
            drop.style.top = "-50px";
            drop.style.fontSize = "40px";
            drop.style.cursor = "pointer";
            drop.style.transition = "top 3s linear";
            document.body.appendChild(drop);
            setTimeout(() => drop.style.top = "110vh", 100);
            drop.onclick = () => { money += 10000 * incomeMult; drop.remove(); renderShop(); };
            setTimeout(() => drop.remove(), 3100);
        }, 20000);
    }

    setInterval(() => {
        money += (pps * incomeMult) / 10;
        updateSpinner();
        document.getElementById('money-display').innerText = "$" + Math.floor(money).toLocaleString();
    }, 100);

    window.onkeydown = (e) => { if(e.code === "Space") document.getElementById('shawarma').click(); };
    renderShop();
</script>
</body>
</html>
